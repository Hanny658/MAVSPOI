runtime:
  # Train split paths produced by utils/build_eval_protocol.py
  yelp_business_json: data/train/yelp-indianapolis-train-business.jsonl
  yelp_profile_json: data/train/yelp-indianapolis-train-profile.jsonl

  # Build-size controls
  yelp_max_businesses: 50000
  yelp_city_filter: ""

  # Retrieval and recommendation controls
  retrieval_top_k: 80
  forecaster_top_k: 25
  final_top_k: 10

  # Embedding cache
  embed_cache_path: data/cache/yelp-indianapolis-train-business-embeddings.faiss

mavspoi:
  router:
    enabled_agents: [A1, A2, A3, A4, A5, A6, A7]
    min_agents: 3
    max_agents: 5
    activation_threshold: 0.45
    fallback_agents: [A1, A3, A4, A6]
    default_max_distance_km: 10.0
    use_llm: false
    llm_temperature: 0.1

  voting:
    candidate_pool_size: 30
    neutral_score: 0.5

  aggregator:
    retrieval_weight: 0.25
    diversity_penalty: 0.04
    neutral_score: 0.5
    weights:
      A1: 0.16
      A2: 0.14
      A3: 0.20
      A4: 0.17
      A5: 0.09
      A6: 0.15
      A7: 0.09
